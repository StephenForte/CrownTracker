services:
  - type: web
    runtime: node
    name: crown-tracker
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crown-tracker-db
          property: connectionString
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true

  - type: cron
    runtime: node
    name: crown-tracker-daily
    plan: starter
    schedule: "0 6 * * *"
    buildCommand: npm ci
    startCommand: npm run pipeline -- --tier=daily
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crown-tracker-db
          property: connectionString
      - key: TAVILY_API_KEY
        sync: false
      - key: TAVILY_MONTHLY_CREDIT_CAP
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_HAIKU_MODEL
        value: claude-haiku-4-5-20251001

  - type: cron
    runtime: node
    name: crown-tracker-chatter
    plan: starter
    schedule: "0 6 * * 1,4"
    buildCommand: npm ci
    startCommand: npm run pipeline -- --tier=chatter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crown-tracker-db
          property: connectionString

  - type: cron
    runtime: node
    name: crown-tracker-monthly
    plan: starter
    schedule: "0 6 1 * *"
    buildCommand: npm ci
    startCommand: npm run pipeline -- --tier=monthly
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crown-tracker-db
          property: connectionString

databases:
  - name: crown-tracker-db
    plan: basic-256mb
    databaseName: crown_tracker
    user: crown_tracker
