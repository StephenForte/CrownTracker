services:
  - type: web
    runtime: node
    name: crown-tracker
    plan: starter
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crown-tracker-db
          property: connectionString
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      # Enables the authenticated Streamable HTTP MCP endpoint at /mcp. Set
      # this to the canonical public web-service URL, e.g.
      # https://crown-tracker.onrender.com (no trailing slash).
      - key: MCP_PUBLIC_BASE_URL
        sync: false
      # Optional comma-separated browser origins beyond Claude's standard web
      # origins. Server-to-server Claude connector calls omit Origin.
      - key: MCP_ALLOWED_ORIGINS
        sync: false
      # Manual “Refresh now” executes in the web service, so it needs the same
      # research-provider configuration as the scheduled daily cron.
      - key: TAVILY_API_KEY
        sync: false
      - key: PHASE1B_ENRICHMENT_ENABLED
        sync: false
      - key: TAVILY_MONTHLY_CREDIT_CAP
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_HAIKU_MODEL
        value: claude-haiku-4-5-20251001
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: ALERT_TO_EMAIL
        sync: false

  - type: cron
    runtime: node
    name: crown-tracker-daily
    plan: starter
    schedule: "0 6 * * *"
    buildCommand: npm ci
    startCommand: npm run pipeline -- --tier=daily
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crown-tracker-db
          property: connectionString
      - key: TAVILY_API_KEY
        sync: false
      - key: PHASE1B_ENRICHMENT_ENABLED
        sync: false
      - key: TAVILY_MONTHLY_CREDIT_CAP
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_HAIKU_MODEL
        value: claude-haiku-4-5-20251001
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: ALERT_TO_EMAIL
        sync: false

  - type: cron
    runtime: node
    name: crown-tracker-chatter
    plan: starter
    schedule: "0 6 * * 1,4"
    buildCommand: npm ci
    startCommand: npm run pipeline -- --tier=chatter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crown-tracker-db
          property: connectionString
      - key: TAVILY_API_KEY
        sync: false
      - key: PHASE1B_ENRICHMENT_ENABLED
        sync: false
      - key: TAVILY_MONTHLY_CREDIT_CAP
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_HAIKU_MODEL
        value: claude-haiku-4-5-20251001
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: ALERT_TO_EMAIL
        sync: false

  - type: cron
    runtime: node
    name: crown-tracker-monthly
    plan: starter
    schedule: "0 6 1 * *"
    buildCommand: npm ci
    startCommand: npm run pipeline -- --tier=monthly
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crown-tracker-db
          property: connectionString
      - key: TAVILY_API_KEY
        sync: false
      - key: PHASE1B_ENRICHMENT_ENABLED
        sync: false
      - key: TAVILY_MONTHLY_CREDIT_CAP
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_HAIKU_MODEL
        value: claude-haiku-4-5-20251001
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: ALERT_TO_EMAIL
        sync: false

databases:
  - name: crown-tracker-db
    plan: basic-256mb
    databaseName: crown_tracker
    user: crown_tracker
